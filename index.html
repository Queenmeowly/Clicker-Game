<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mini App</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 50px;
    }

    .card {
      background: #1e293b;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    .coin {
      font-size: 60px;
      cursor: pointer;
      user-select: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>👤 Profile</h2>
    <p id="user">Loading...</p>
  </div>

  <div class="card">
    <h2>🎮 Game</h2>

    <div class="coin" onclick="addScore()">🪙</div>

    <p>Score: <span id="score">0</span></p>

    <button onclick="reset()">Reset</button>
  </div>

  <script>
    // 🔥 اول چک کن تلگرام هست یا نه
    let tg = null;
    try {
      tg = window.Telegram.WebApp;
      tg.expand();
    } catch (e) {
      console.log("Not in Telegram");
    }

    // 👤 اسم کاربر (اگر تلگرام بود)
    let username = "Guest";
    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
      username = tg.initDataUnsafe.user.first_name;
    }
    document.getElementById("user").innerText = username;

    // 💾 لود امتیاز (safe)
    let score = 0;

    try {
      let saved = localStorage.getItem("score");
      if (saved !== null) {
        score = Number(saved);
      }
    } catch (e) {
      score = 0;
    }

    function updateUI() {
      document.getElementById("score").innerText = score;
    }

    updateUI();

    function addScore() {
      score++;
      updateUI();

      try {
        localStorage.setItem("score", String(score));
      } catch (e) {}
    }

    function reset() {
      score = 0;
      updateUI();

      try {
        localStorage.setItem("score", "0");
      } catch (e) {}
    }
  </script>

</body>
</html>
